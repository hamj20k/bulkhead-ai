[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bulkhead-ai"
version = "0.2.0"
description = "Tiny library for separating trusted prompts from untrusted RAG/tool content"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
dependencies = []
authors = [{ name = "Hamza Jawad" }]
keywords = [
  "llm",
  "security",
  "prompt-injection",
  "ai",
  "middleware",
  "agent",
  "context-separation",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Security",
  "Typing :: Typed",
]

[project.optional-dependencies]
# Cloud judge providers
openai = ["openai>=1.0.0"]
anthropic = ["anthropic>=0.20.0"]
# Ollama judge talks HTTP over the stdlib, so it needs nothing extra.
ollama = []
# Local model backends (download weights on first use; never bundled).
onnx = ["onnxruntime>=1.16.0", "huggingface-hub>=0.20.0", "tokenizers>=0.15.0"]
llama = ["llama-cpp-python>=0.2.0", "huggingface-hub>=0.20.0"]
transformers = ["transformers>=4.40.0", "torch>=2.0.0"]
all = [
  "openai>=1.0.0",
  "anthropic>=0.20.0",
  "onnxruntime>=1.16.0",
  "huggingface-hub>=0.20.0",
  "tokenizers>=0.15.0",
  "llama-cpp-python>=0.2.0",
]

[project.scripts]
bulkhead = "bulkhead.cli:main"

[project.urls]
Homepage = "https://github.com/hamj20k/bulkhead-ai"
Repository = "https://github.com/hamj20k/bulkhead-ai"

[tool.hatch.version]
path = "bulkhead/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["bulkhead"]
