[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "bulkhead-ai"
version = "0.1.1"
description = "Tiny library for separating trusted prompts from untrusted RAG/tool content"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
dependencies = []
authors = [{ name = "Hamza Jawad" }]
keywords = [
  "llm",
  "security",
  "prompt-injection",
  "ai",
  "middleware",
  "agent",
  "context-separation",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Security",
  "Typing :: Typed",
]

[project.optional-dependencies]
openai = ["openai>=1.0.0"]
anthropic = ["anthropic>=0.20.0"]
all = ["openai>=1.0.0", "anthropic>=0.20.0"]

[project.urls]
Homepage = "https://github.com/hamj20k/bulkhead-ai"
Repository = "https://github.com/hamj20k/bulkhead-ai"

[tool.hatch.version]
path = "bulkhead/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["bulkhead"]
